openapi: 3.0.3
info:
  title: TradeAPI
  version: 2.0.0
paths:
  /v2/accounts/{id}/balance:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: currency
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: string
                    description: "decimal as string"
                  pending:
                    type: string
                  currency:
                    type: string

  /v2/orders:
    post:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [instrument, direction, size, risk]
              properties:
                instrument:
                  type: string
                direction:
                  type: string
                  enum: [long, short]
                size:
                  type: string
                  description: "decimal as string"
                risk:
                  type: object
                  required: [type]
                  properties:
                    type:
                      type: string
                      enum: [stop_loss, take_profit]
                    value:
                      type: string
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: string
                  state:
                    type: string
                    enum: [pending, accepted, rejected]

  /v2/ping:
    get:
      responses:
        '200':
          description: Pong

  /v2/user:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  details:
                    type: object
                    properties:
                      username:
                        type: string
                      email:
                        type: string

  /v2/market/stats:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  index:
                    type: string
                  daily_change:
                    type: string

  /v2/history/orders:
    get:
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    timestamp:
                      type: string
